<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso | Escuela Cuid-Arte</title>
  <meta http-equiv="refresh" content="0; url=https://alumnos.escuelacuidarte.com/" />
  <style>
    :root {
      --green: #6ba06b;
      --mint: #cde8cd;
      --gold: #d4af37;
      --dark: #1a2e1a;
    }
    body {
      margin: 0;
      font-family: "Open Sans", Arial, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #f5fbf5 0%, #ffffff 100%);
      color: var(--dark);
    }
    .card {
      width: min(560px, calc(100vw - 2rem));
      background: #fff;
      border: 1px solid var(--mint);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(107, 160, 107, 0.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-family: Montserrat, "Open Sans", Arial, sans-serif;
      font-size: 1.8rem;
    }
    p {
      margin: 0 0 18px;
      color: #3c5a3c;
      line-height: 1.5;
    }
    a {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(90deg, var(--green), #558055);
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
    }
    small {
      display: block;
      margin-top: 14px;
      color: #6d7f6d;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Acceso a Zona Alumnos</h1>
    <p>Te estamos redirigiendo al portal de alumnos de Escuela Cuid-Arte.</p>
    <a href="https://alumnos.escuelacuidarte.com/">Entrar ahora</a>
    <small>Si no redirige automaticamente, usa el boton.</small>
  </main>
</body>
</html>
